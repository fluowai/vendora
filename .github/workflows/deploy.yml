name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAMESPACE: ghcr.io/fluowai/vendora

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: api
            context: .
            dockerfile: Dockerfile
          - name: frontend
            context: .
            dockerfile: Dockerfile.frontend
          - name: whatsmeow-bridge
            context: ./whatsmeow-bridge
            dockerfile: ./whatsmeow-bridge/Dockerfile
          - name: wacalls-server
            context: ./wacalls-server
            dockerfile: ./wacalls-server/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Docker meta (${{ matrix.service.name }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.head_branch == 'main' }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: [build-and-push]
    if: github.event_name == 'workflow_run' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging
        run: |
          echo "Images pushed:"
          echo "  ${{ env.IMAGE_NAMESPACE }}/api:latest"
          echo "  ${{ env.IMAGE_NAMESPACE }}/frontend:latest"
          echo "  ${{ env.IMAGE_NAMESPACE }}/whatsmeow-bridge:latest"
          echo "  ${{ env.IMAGE_NAMESPACE }}/wacalls-server:latest"

  deploy-production:
    needs: [build-and-push]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production
        run: |
          echo "Images pushed:"
          echo "  ${{ env.IMAGE_NAMESPACE }}/api:latest"
          echo "  ${{ env.IMAGE_NAMESPACE }}/frontend:latest"
          echo "  ${{ env.IMAGE_NAMESPACE }}/whatsmeow-bridge:latest"
          echo "  ${{ env.IMAGE_NAMESPACE }}/wacalls-server:latest"
