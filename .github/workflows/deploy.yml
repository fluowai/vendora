name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAMESPACE: ghcr.io/fluowai/vendora

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://postgres:test@localhost:5432/postgres"
      NODE_ENV: test
      JWT_SECRET: test-secret-do-not-use-in-production
      JWT_REFRESH_SECRET: test-refresh-secret-do-not-use-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npx prisma migrate deploy
      - run: npm test

  build-and-push:
    needs: [test-and-lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: api
            dockerfile: Dockerfile
          - name: frontend
            dockerfile: Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta (${{ matrix.service.name }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging
        run: |
          echo "Images pushed:"
          echo "  ${{ env.IMAGE_NAMESPACE }}/api:latest"
          echo "  ${{ env.IMAGE_NAMESPACE }}/frontend:latest"

  deploy-production:
    needs: [build-and-push]
    if: github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production
        run: |
          echo "Images pushed:"
          echo "  ${{ env.IMAGE_NAMESPACE }}/api:latest"
          echo "  ${{ env.IMAGE_NAMESPACE }}/frontend:latest"
