version: "3.8"

services:
  frontend:
    image: ghcr.io/fluowai/vendora/frontend:latest
    environment:
      VITE_API_URL: "same-origin"
    networks:
      - woopanel1
      - vendaora_internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=woopanel1"
      - "traefik.http.routers.vendaora_frontend.rule=Host(`vendedoraai.consultio.com.br`) && !PathPrefix(`/api`) && !PathPrefix(`/socket.io`) && !PathPrefix(`/uploads`)"
      - "traefik.http.routers.vendaora_frontend.entrypoints=websecure"
      - "traefik.http.routers.vendaora_frontend.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.vendaora_frontend.priority=1"
      - "traefik.http.routers.vendaora_frontend.service=vendaora_frontend"
      - "traefik.http.services.vendaora_frontend.loadbalancer.server.port=80"
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=woopanel1"
        - "traefik.http.routers.vendaora_frontend.rule=Host(`vendedoraai.consultio.com.br`) && !PathPrefix(`/api`) && !PathPrefix(`/socket.io`) && !PathPrefix(`/uploads`)"
        - "traefik.http.routers.vendaora_frontend.entrypoints=websecure"
        - "traefik.http.routers.vendaora_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.vendaora_frontend.priority=1"
        - "traefik.http.routers.vendaora_frontend.service=vendaora_frontend"
        - "traefik.http.services.vendaora_frontend.loadbalancer.server.port=80"

  api:
    image: ghcr.io/fluowai/vendora/api:latest
    environment:
      NODE_ENV: production
      PORT: 3333
      SERVE_STATIC: "false"
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-false}"
      MIGRATE_DATABASE_URL: "${MIGRATE_DATABASE_URL:-}"
      MIGRATE_TIMEOUT_SECONDS: "${MIGRATE_TIMEOUT_SECONDS:-120}"
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      REDIS_URL: "redis://redis:6379"
      APP_URL: "https://vendedoraai.consultio.com.br"
      API_URL: "https://vendedoraai.consultio.com.br"
      FRONTEND_URL: "https://vendedoraai.consultio.com.br"
      ENABLE_EMBEDDED_WACALLS: "false"
      ENABLE_EMBEDDED_WAHAPLUS: "false"
      WHATSMEOW_BRIDGE_URL: "http://whatsmeow-bridge:4000"
      WHATSMEOW_WEBHOOK_URL: "http://api:3333/api/integrations/whatsmeow/incoming?tenantId=${WHATSMEOW_TENANT_ID:-seed-tenant}"
      WHATSMEOW_BRIDGE_SECRET: "${WHATSMEOW_BRIDGE_SECRET:?WHATSMEOW_BRIDGE_SECRET is required}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-nb.consultio.com.br}"
      MINIO_PORT: "${MINIO_PORT:-443}"
      MINIO_USE_SSL: "${MINIO_USE_SSL:-true}"
      MINIO_BUCKET: "${MINIO_BUCKET:-vendedoraaiwpp}"
      MINIO_PUBLIC_URL: "${MINIO_PUBLIC_URL:-https://nb.consultio.com.br}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/api/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 180s
      retries: 5
    networks:
      - woopanel1
      - vendaora_internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=woopanel1"
      - "traefik.http.routers.vendaora_api.rule=(Host(`vendedoraai.consultio.com.br`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.vendaora_api.entrypoints=websecure"
      - "traefik.http.routers.vendaora_api.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.vendaora_api.priority=10"
      - "traefik.http.routers.vendaora_api.service=vendaora_api"
      - "traefik.http.routers.vendaora_ws.rule=(Host(`vendedoraai.consultio.com.br`)) && PathPrefix(`/socket.io`)"
      - "traefik.http.routers.vendaora_ws.entrypoints=websecure"
      - "traefik.http.routers.vendaora_ws.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.vendaora_ws.priority=20"
      - "traefik.http.routers.vendaora_ws.service=vendaora_api"
      - "traefik.http.routers.vendaora_uploads.rule=(Host(`vendedoraai.consultio.com.br`)) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.vendaora_uploads.entrypoints=websecure"
      - "traefik.http.routers.vendaora_uploads.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.vendaora_uploads.priority=10"
      - "traefik.http.routers.vendaora_uploads.service=vendaora_api"
      - "traefik.http.services.vendaora_api.loadbalancer.server.port=3333"
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=woopanel1"
        - "traefik.http.routers.vendaora_api.rule=(Host(`vendedoraai.consultio.com.br`)) && PathPrefix(`/api`)"
        - "traefik.http.routers.vendaora_api.entrypoints=websecure"
        - "traefik.http.routers.vendaora_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.vendaora_api.priority=10"
        - "traefik.http.routers.vendaora_api.service=vendaora_api"
        - "traefik.http.routers.vendaora_ws.rule=(Host(`vendedoraai.consultio.com.br`)) && PathPrefix(`/socket.io`)"
        - "traefik.http.routers.vendaora_ws.entrypoints=websecure"
        - "traefik.http.routers.vendaora_ws.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.vendaora_ws.priority=20"
        - "traefik.http.routers.vendaora_ws.service=vendaora_api"
        - "traefik.http.routers.vendaora_uploads.rule=(Host(`vendedoraai.consultio.com.br`)) && PathPrefix(`/uploads`)"
        - "traefik.http.routers.vendaora_uploads.entrypoints=websecure"
        - "traefik.http.routers.vendaora_uploads.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.vendaora_uploads.priority=10"
        - "traefik.http.routers.vendaora_uploads.service=vendaora_api"
        - "traefik.http.services.vendaora_api.loadbalancer.server.port=3333"
    depends_on:
      - redis
      - whatsmeow-bridge

  whatsmeow-bridge:
    image: ghcr.io/fluowai/vendora/whatsmeow-bridge:latest
    environment:
      PORT: "4000"
      WHATSMEOW_DB_PATH: "file:/data/whatsmeow.db?_pragma=foreign_keys(1)"
      WHATSMEOW_WEBHOOK_URL: "http://api:3333/api/integrations/whatsmeow/incoming?tenantId=${WHATSMEOW_TENANT_ID:-seed-tenant}"
      WHATSMEOW_BRIDGE_SECRET: "${WHATSMEOW_BRIDGE_SECRET:?WHATSMEOW_BRIDGE_SECRET is required}"
      WHATSMEOW_PAIR_DISPLAY_NAME: "${WHATSMEOW_PAIR_DISPLAY_NAME:-Chrome (Windows)}"
    networks:
      - vendaora_internal
    volumes:
      - whatsmeow_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - vendaora_internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5

volumes:
  redis_data:
  whatsmeow_data:

networks:
  woopanel1:
    external: true
  vendaora_internal:
    driver: overlay
