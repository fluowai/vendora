services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vendaora
      POSTGRES_PASSWORD: vendaora_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  whatsmeow-bridge:
    build:
      context: ./whatsmeow-bridge
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      WHATSMEOW_DB_PATH: "file:/data/whatsmeow.db?_pragma=foreign_keys(1)"
      WHATSMEOW_WEBHOOK_URL: "http://app:3333/api/integrations/whatsmeow/incoming?tenantId=seed-tenant"
      WHATSMEOW_BRIDGE_SECRET: "${WHATSMEOW_BRIDGE_SECRET}"
    volumes:
      - whatsmeow_data:/data
    restart: unless-stopped

  wahaplus:
    image: ${WAHAPLUS_IMAGE:-devlikeapro/waha}
    ports:
      - "${WAHAPLUS_PORT:-3000}:3000"
    environment:
      WAHA_LICENSE_KEY: "${WAHAPLUS_LICENSE:-}"
    volumes:
      - wahaplus_data:/app/.sessions
      - wahaplus_data:/app/.media
    restart: unless-stopped

  wacalls:
    build:
      context: ./wacalls-server
    ports:
      - "8081:8081"
    environment:
      WACALLS_PORT: "8081"
    volumes:
      - wacalls_data:/data
    command: ["-addr", ":8081", "-db", "/data/wacalls.db"]
    restart: unless-stopped

  # woozapi2 — Novo sistema: WAHA para mensagens + wacall para chamadas
  woozapi2-waha:
    image: ${WOOZAPI2_WAHA_IMAGE:-devlikeapro/waha}
    ports:
      - "${WOOZAPI2_WAHA_PORT:-3002}:3000"
    environment:
      WAHA_LICENSE_KEY: "${WOOZAPI2_WAHA_LICENSE:-}"
    volumes:
      - woozapi2_waha_data:/app/.sessions
      - woozapi2_waha_data:/app/.media
    restart: unless-stopped

  woozapi2-wacall:
    build:
      context: ./wacalls-server
    ports:
      - "${WOOZAPI2_WACALL_PORT:-8082}:8081"
    environment:
      WACALLS_PORT: "8081"
    volumes:
      - woozapi2_wacall_data:/data
    command: ["-addr", ":8081", "-db", "/data/woozapi2.db"]
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: production
      PORT: "3333"
      DATABASE_URL: "postgresql://postgres:vendaora_secret@postgres:5432/vendaora"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      APP_URL: "${APP_URL:-http://localhost:3333}"
      API_URL: "${API_URL:-http://localhost:3333}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:5173}"
      WHATSMEOW_BRIDGE_URL: "http://whatsmeow-bridge:4000"
      WHATSMEOW_BRIDGE_SECRET: "${WHATSMEOW_BRIDGE_SECRET}"
      WHATSMEOW_WEBHOOK_URL: "http://app:3333/api/integrations/whatsmeow/incoming?tenantId=seed-tenant"
      WACALLS_URL: "http://wacalls:8081"
      WAHAPLUS_URL: "http://wahaplus:3000"
      WAHAPLUS_IMAGE: "${WAHAPLUS_IMAGE:-devlikeapro/waha}"
      WOOZAPI2_WAHA_URL: "http://woozapi2-waha:3000"
      WOOZAPI2_WACALL_URL: "http://woozapi2-wacall:8081"
      SENTRY_DSN: "${SENTRY_DSN}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  whatsmeow_data:
  wacalls_data:
  wahaplus_data:
  woozapi2_waha_data:
  woozapi2_wacall_data:
